version: 2

sources:
  - name: sales_source
    schema: "{{ env_var('DBT_POSTGRES_SCHEMA', 'public') }}"
    tables:
      - name: sales_facts
        description: "Фактовая таблица продаж."
        columns:
          - name: event_date
            tests:
              - not_null
          - name: product_id
            tests:
              - not_null
          - name: user_id
            tests:
              - not_null
          - name: amount
            tests:
              - not_null
          - name: quantity
            tests:
              - not_null
